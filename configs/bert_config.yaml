# BERT Training Configuration

# ==========================================
# Paths (Path settings)
# !!Please modify the items below to match your local environment and dataset paths!!
# ==========================================
tokenizer_path: "your/custom/tokenizer/path"  # Or a Hugging Face model name (e.g., "bert-base-uncased")
checkpoint_base_dir: "./models/bert/checkpoints"
word_checkpoint_dir: "./models/bert/word_checkpoints"

# Dataset paths for each phase (the same data is used as GPT)
phases:
  easy: "./data/phase_1_easy.json"
  medium: "./data/phase_2_medium.json"
  hard: "./data/phase_3_hard.json"

# ==========================================
# Hyperparameters (training settings for paper reproduction)
# ==========================================
seed: 107
num_epochs: 10
batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 5.0e-5